version: "3.9"

services:
  api:
    build: .
    container_name: engineerflow_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  worker:
    build: .
    container_name: engineerflow_worker
    command: celery -A app.workers.celery_app.celery worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: engineerflow_redis
    ports:
      - "6379:6379"